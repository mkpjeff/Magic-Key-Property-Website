kind = "web"
previewPath = "/"
title = "Magic Key Property"
version = "1.0.0"
id = "artifacts/magic-key-property"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22144

[services.development]
run = "pnpm --filter @workspace/magic-key-property run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/magic-key-property", "run", "build" ]
publicDir = "artifacts/magic-key-property/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22144"
BASE_PATH = "/"
